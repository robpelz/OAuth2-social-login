<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fehler - Social Login</title>
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/6.4.2/css/all.min.css}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .error-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 48px 40px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-icon {
            font-size: 64px;
            color: #ef4444;
            margin-bottom: 16px;
            display: block;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .error-container h1 {
            color: #1a1a2e;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .error-container .subtitle {
            color: #6b7280;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .error-detail {
            background: #fef2f2;
            border-left: 4px solid #ef4444;
            padding: 16px 20px;
            border-radius: 8px;
            margin: 24px 0;
            text-align: left;
        }

        .error-detail .label {
            font-size: 12px;
            color: #6b7280;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .error-detail .message {
            color: #991b1b;
            font-size: 14px;
            margin-top: 4px;
        }

        .error-detail .timestamp {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 8px;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            display: inline-block;
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a6fd6;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
            transform: translateY(-2px);
        }

        .btn i {
            margin-right: 8px;
        }
    </style>
</head>
<body>
<div class="error-container">
    <!-- Fehler-Icon -->
    <span class="error-icon">
            <i class="fas fa-exclamation-triangle"></i>
        </span>

    <!-- Fehlermeldung -->
    <h1 th:text="${error} ?: 'Ein Fehler ist aufgetreten'">Ein Fehler ist aufgetreten</h1>
    <p class="subtitle" th:text="${errorDetail} ?: 'Bitte versuche es später erneut'">
        Bitte versuche es später erneut
    </p>

    <!-- Technische Details (nur für Entwickler sichtbar) -->
    <div class="error-detail" th:if="${errorDetail}">
        <div class="label">
            <i class="fas fa-code"></i> Details
        </div>
        <div class="message" th:text="${errorDetail}">Fehlerdetails</div>
        <div class="timestamp" th:if="${timestamp}">
            <i class="far fa-clock"></i>
            <span th:text="${#temporals.format(timestamp, 'dd.MM.yyyy HH:mm:ss')}">01.01.2024 12:00:00</span>
        </div>
    </div>

    <!-- Aktionen -->
    <div class="actions">
        <a href="/login" class="btn btn-primary">
            <i class="fas fa-arrow-left"></i> Zurück zur Login-Seite
        </a>
        <a href="javascript:location.reload()" class="btn btn-secondary">
            <i class="fas fa-sync"></i> Erneut versuchen
        </a>
    </div>

    <!-- Hilfreiche Links -->
    <div style="margin-top: 24px; font-size: 13px; color: #9ca3af;">
        <i class="fas fa-life-ring"></i>
        <span th:if="${error} == 'OAuth2 Login fehlgeschlagen'">
                Du kannst auch direkt zu
                <a href="/oauth2/authorization/github" style="color: #667eea; text-decoration: none;">GitHub</a>
                oder
                <a href="/oauth2/authorization/google" style="color: #667eea; text-decoration: none;">Google</a>
                gehen.
            </span>
        <span th:unless="${error} == 'OAuth2 Login fehlgeschlagen'">
                Bei wiederholten Problemen kontaktiere bitte den Support.
            </span>
    </div>
</div>
</body>
</html>
