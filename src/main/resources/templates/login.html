<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Login</title>

    <!-- Font Awesome über WebJars -->
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/6.4.2/css/all.min.css}">

    <style>
        /* ===== Grundlegende Reset-Styles ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* ===== Hintergrundanimation ===== */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.1) 0%, transparent 60%);
            animation: rotate 30s linear infinite;
            z-index: 0;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== Login-Container ===== */
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 48px 40px 40px;
            border-radius: 24px;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== Header ===== */
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header .logo-icon {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 12px;
            display: block;
        }

        .login-header h1 {
            color: #1a1a2e;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .login-header p {
            color: #6b7280;
            font-size: 15px;
            margin-top: 8px;
        }

        /* ===== Meldungen ===== */
        .message {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.error {
            background: #fef2f2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }

        .message.success {
            background: #f0fdf4;
            color: #166534;
            border-left: 4px solid #22c55e;
        }

        .message i {
            font-size: 18px;
        }

        /* ===== OAuth Buttons ===== */
        .oauth-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .oauth-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 20px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            color: white;
            gap: 14px;
            position: relative;
            overflow: hidden;
        }

        /* ===== Button-Hover-Effekt ===== */
        .oauth-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .oauth-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .oauth-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
        }

        .oauth-btn:active {
            transform: translateY(0) scale(0.98);
        }

        /* ===== GitHub Button ===== */
        .oauth-btn.github {
            background: #24292e;
        }

        .oauth-btn.github:hover {
            background: #2f363d;
            box-shadow: 0 12px 30px rgba(36, 41, 46, 0.4);
        }

        .oauth-btn.github i {
            font-size: 26px;
        }

        /* ===== Google Button ===== */
        .oauth-btn.google {
            background: #ea4335;
        }

        .oauth-btn.google:hover {
            background: #d33426;
            box-shadow: 0 12px 30px rgba(234, 67, 53, 0.4);
        }

        .oauth-btn.google i {
            font-size: 24px;
        }

        /* ===== Button-Label ===== */
        .oauth-btn .btn-label {
            flex: 1;
            text-align: center;
            letter-spacing: 0.3px;
        }

        /* ===== Divider ===== */
        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #9ca3af;
            font-size: 13px;
            gap: 16px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, #d1d5db, transparent);
        }

        /* ===== Footer ===== */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: #9ca3af;
        }

        .login-footer i {
            margin: 0 4px;
        }

        .login-footer .heart {
            color: #ef4444;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* ===== Responsive Design ===== */
        @media (max-width: 480px) {
            .login-container {
                padding: 32px 20px 28px;
            }

            .login-header h1 {
                font-size: 24px;
            }

            .oauth-btn {
                padding: 14px 16px;
                font-size: 14px;
            }

            .oauth-btn.github i {
                font-size: 22px;
            }

            .oauth-btn.google i {
                font-size: 20px;
            }
        }

        /* ===== Dark Mode Support ===== */
        @media (prefers-color-scheme: dark) {
            .login-container {
                background: rgba(26, 26, 46, 0.95);
                backdrop-filter: blur(20px);
            }

            .login-header h1 {
                color: #f3f4f6;
            }

            .login-header p {
                color: #9ca3af;
            }

            .divider {
                color: #6b7280;
            }

            .divider::before,
            .divider::after {
                background: linear-gradient(to right, transparent, #4b5563, transparent);
            }

            .login-footer {
                color: #6b7280;
            }
        }
    </style>
</head>
<body>

<div class="login-container">
    <!-- ===== Header ===== -->
    <div class="login-header">
        <span class="logo-icon">🔐</span>
        <h1>Willkommen zurück</h1>
        <p>Melde dich mit deinem Social Media Account an</p>
    </div>

    <!-- ===== Fehlermeldung ===== -->
    <div th:if="${errorMessage}" class="message error">
        <i class="fas fa-exclamation-circle"></i>
        <span th:text="${errorMessage}">Anmeldung fehlgeschlagen</span>
    </div>

    <!-- ===== Erfolgsmeldung (Logout) ===== -->
    <div th:if="${logoutMessage}" class="message success">
        <i class="fas fa-check-circle"></i>
        <span th:text="${logoutMessage}">Erfolgreich abgemeldet</span>
    </div>

    <!-- ===== OAuth Buttons ===== -->
    <div class="oauth-buttons">
        <!-- GitHub -->
        <a href="/oauth2/authorization/github" class="oauth-btn github">
            <i class="fab fa-github"></i>
            <span class="btn-label">Mit GitHub anmelden</span>
            <i class="fas fa-chevron-right" style="font-size: 14px; opacity: 0.6;"></i>
        </a>

        <!-- Google -->
        <a href="/oauth2/authorization/google" class="oauth-btn google">
            <i class="fab fa-google"></i>
            <span class="btn-label">Mit Google anmelden</span>
            <i class="fas fa-chevron-right" style="font-size: 14px; opacity: 0.6;"></i>
        </a>
    </div>

    <!-- ===== Divider ===== -->
    <div class="divider">
        <span>oder</span>
    </div>

    <!-- ===== Footer ===== -->
    <div class="login-footer">
        <i class="fas fa-shield-alt"></i>
        Sicher &amp; verschlüsselt
        <span style="margin: 0 8px;">·</span>
        Made with <i class="fas fa-heart heart"></i>
    </div>
</div>

</body>
</html>
