<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Login</title>

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Hintergrund-Animation */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.1) 0%, transparent 60%);
            animation: rotate 30s linear infinite;
            z-index: 0;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 48px 40px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s ease-out;
            text-align: center;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-icon {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 12px;
            display: block;
        }

        h1 {
            color: #1a1a2e;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #6b7280;
            font-size: 15px;
            margin-bottom: 30px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .message.error {
            background: #fef2f2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }

        .message.success {
            background: #f0fdf4;
            color: #166534;
            border-left: 4px solid #22c55e;
        }

        .logout-section {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }

        .logout-section .user-info {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .logout-section .user-info strong {
            color: #1a1a2e;
        }

        .btn-logout {
            display: inline-block;
            padding: 10px 24px;
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
            border-radius: 10px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            background: #fee2e2;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(239, 68, 68, 0.2);
        }

        .oauth-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .oauth-btn {
            display: flex !important;
            align-items: center;
            justify-content: center;
            padding: 16px 20px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            color: white;
            gap: 14px;
            width: 100%;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .oauth-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .oauth-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .oauth-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
        }

        .oauth-btn.github {
            background: #24292e;
        }

        .oauth-btn.github:hover {
            background: #2f363d;
        }

        .oauth-btn.github i {
            font-size: 26px;
        }

        .oauth-btn.google {
            background: #ea4335;
        }

        .oauth-btn.google:hover {
            background: #d33426;
        }

        .oauth-btn.google i {
            font-size: 24px;
        }

        .oauth-btn .btn-label {
            flex: 1;
            text-align: center;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #9ca3af;
            font-size: 13px;
            gap: 16px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, #d1d5db, transparent);
        }

        .login-footer {
            margin-top: 24px;
            font-size: 13px;
            color: #9ca3af;
        }

        .login-footer .heart {
            color: #ef4444;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 32px 20px 28px;
            }
            h1 {
                font-size: 24px;
            }
            .oauth-btn {
                padding: 14px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div class="login-container">

    <!-- Header -->
    <span class="logo-icon">🔐</span>
    <h1>Willkommen zurück</h1>
    <p class="subtitle">Melde dich mit deinem Social Media Account an</p>

    <!-- Fehlermeldung -->
    <div th:if="${errorMessage}" class="message error">
        <i class="fas fa-exclamation-circle"></i>
        <span th:text="${errorMessage}">Anmeldung fehlgeschlagen</span>
    </div>

    <!-- Erfolgsmeldung (Logout) -->
    <div th:if="${logoutMessage}" class="message success">
        <i class="fas fa-check-circle"></i>
        <span th:text="${logoutMessage}">Erfolgreich abgemeldet</span>
    </div>

    <!-- Logout-Bereich (nur für echte OAuth2-Benutzer) -->
    <div th:if="${#authentication != null && #authentication.authenticated && #authentication.name != 'anonymousUser'}"
         class="logout-section">
        <div class="user-info">
            <i class="fas fa-user-check" style="color: #22c55e;"></i>
            Angemeldet als: <strong th:text="${#authentication.name}">User</strong>
        </div>
        <a href="/logout" class="btn-logout">
            <i class="fas fa-sign-out-alt"></i> Abmelden
        </a>
    </div>

    <!-- OAuth Buttons (nur wenn NICHT eingeloggt) -->
    <div th:if="${#authentication == null || !#authentication.authenticated || #authentication.name == 'anonymousUser'}">
        <div class="oauth-buttons">
            <a href="/oauth2/authorization/github" class="oauth-btn github">
                <i class="fab fa-github"></i>
                <span class="btn-label">Mit GitHub anmelden</span>
                <i class="fas fa-chevron-right" style="font-size: 14px; opacity: 0.5;"></i>
            </a>

            <a href="/oauth2/authorization/google" class="oauth-btn google">
                <i class="fab fa-google"></i>
                <span class="btn-label">Mit Google anmelden</span>
                <i class="fas fa-chevron-right" style="font-size: 14px; opacity: 0.5;"></i>
            </a>
        </div>

        <div class="divider">
            <span>oder</span>
        </div>
    </div>

    <!-- Footer -->
    <div class="login-footer">
        <i class="fas fa-shield-alt"></i>
        Sicher &amp; verschlüsselt
        <span style="margin: 0 8px;">·</span>
        Made with <i class="fas fa-heart heart"></i>
    </div>
</div>

</body>
</html>
